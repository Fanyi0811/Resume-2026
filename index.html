<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人简历">
  <title>个人简历</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true">
    <canvas class="intro-canvas" id="intro-canvas"></canvas>
    <div class="intro-skip">
      <button class="intro-skip-btn" id="intro-skip" type="button">跳过</button>
    </div>
  </div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo" id="nav-name"></a>
      <button class="nav-toggle" id="nav-toggle" aria-label="打开菜单">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links"></ul>
    </div>
  </nav>

  <main>
    <section id="hero" class="hero">
      <div class="hero-bg"></div>
      <div class="container hero-content">
        <div class="hero-header">
          <div class="hero-avatar" id="hero-avatar"></div>
          <div class="hero-meta">
            <h1 class="hero-name" id="hero-name"></h1>
            <p class="hero-title" id="hero-title"></p>
            <p class="hero-summary" id="hero-summary"></p>
            <div class="hero-actions" id="hero-actions"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container">
        <h2 class="section-title" id="about-title"></h2>
        <div class="about-grid">
          <div class="about-text" id="about-text"></div>
          <div class="about-highlights" id="about-highlights"></div>
        </div>
      </div>
    </section>

    <section id="experience" class="section section-alt">
      <div class="container">
        <h2 class="section-title" id="experience-title"></h2>
        <div class="timeline" id="experience-list"></div>
      </div>
    </section>

    <section id="projects" class="section">
      <div class="container">
        <h2 class="section-title" id="projects-title"></h2>
        <div class="timeline" id="projects-list"></div>
      </div>
    </section>

    <section id="skills" class="section section-alt">
      <div class="container">
        <h2 class="section-title" id="skills-title"></h2>
        <div class="skills-grid" id="skills-list"></div>
      </div>
    </section>

    <section id="education" class="section">
      <div class="container">
        <h2 class="section-title" id="education-title"></h2>
        <div class="education-list" id="education-list"></div>
      </div>
    </section>

    <section id="contact" class="section contact-section">
      <div class="container">
        <h2 class="section-title" id="contact-title"></h2>
        <p class="contact-intro" id="contact-intro"></p>
        <div class="contact-cards" id="contact-list"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <script src="content.js"></script>
  <script src="intro.js"></script>
  <script src="app.js"></script>
</body>
</html>
